<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Portfolio Rina</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --page-max: 1200px;
      --accent: #0b0b0b;
      --muted: #6b6b6b;
      --bg: #ffffff;
      --gutter: clamp(18px, 2.6vw, 36px);
      --thumb-min: 84px; /* smallest thumbnail */
      --thumb-max: 140px; /* largest thumbnail */
    }
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: var(--bg);
      color: var(--accent);
      font-family: "Noto Sans JP", system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image: url('assets/r_background.png');
      background-size: cover;
      background-position: center;
      opacity: 0.04;
      pointer-events: none;
      z-index: -2;
    }
    header.site-header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 76px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px var(--gutter);
      background: rgba(255,255,255,0.96);
      z-index: 80;
      box-shadow: 0 1px 0 rgba(0,0,0,0.03);
    }
    .brand { 
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 16px;
      font-weight: 400;
    }
    .brand a { color: var(--accent); text-decoration: none; }
    nav.top-nav {
      display: flex;
      gap: 24px;
      align-items: center;
      font-size: 14px;
    }
    nav.top-nav a {
      color: var(--accent);
      text-decoration: none;
      padding: 6px 8px;
    }
    nav.top-nav a:hover { text-decoration: underline; }

    .wrap {
      max-width: var(--page-max);
      margin: 0 auto;
      padding: 140px var(--gutter) 80px var(--gutter);
      box-sizing: border-box;
      position: relative;
      z-index: 2;
    }

    /* HERO + background logo */
    .hero {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 18px;
      padding: 40px 10px;
      z-index: 3;
      overflow: hidden;
    }
    .hero-bg-logo {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: min(60vw, 800px);
      height: auto;
      opacity: 0.03;
      pointer-events: none;
      z-index: 0;
      transition: opacity 0.6s ease-in-out;
      user-select: none;
    }
    .hero .title, .hero .title-jp {
      font-family: 'Playfair Display', Georgia, serif;
      font-weight: 400;
      margin: 0;
      font-size: clamp(32px, 6.8vw, 64px);
      line-height: 1.02;
      color: var(--accent);
      max-width: 92%;
      word-break: keep-all;
      hyphens: none;
    }
    .hero .lead {
      margin-top: 6px;
      color: var(--muted);
      font-size: 16px;
      max-width: 880px;
      line-height: 1.7;
    }

    .section {
      margin-top: 84px;
      margin-bottom: 84px;
    }
    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: 32px;
      margin: 0 0 18px 0;
      color: var(--accent);
    }

    /* PROJECT LAYOUT */
    .work .project {
      display: block;
      width: 100%;
      margin-bottom: 88px;
    }
    /* two-column project layout: left = title + thumbnails, right = longer text (keeps original copy) */
    .work .project-inner {
      display: flex;
      flex-direction: row;
      gap: 28px;
      align-items: flex-start;
    }
    .work .project-text {
      width: 36%;
      min-width: 260px;
      padding-right: 0;
      box-sizing: border-box;
    }

    /* moved media-grid inside project-text — thumbnails layout */
    .work .media-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 12px;
      align-items: flex-start;
    }
    /* thumbnail sizing: responsive, consistent across the site */
    .work .media-grid > * {
      /* clamp between min and max depending on viewport */
      flex: 0 0 clamp(var(--thumb-min), 11.5vw, var(--thumb-max));
      height: auto;
      display: block;
      border-radius: 6px;
      overflow: hidden;
      box-shadow: 0 6px 18px rgba(10,10,10,0.06);
      border: 1px solid rgba(0,0,0,0.04);
      object-fit: cover;
    }
    .work .media-grid img, .work .media-grid video {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      vertical-align: middle;
    }

    /* right column: keep the project description (meta + desc) */
    .work .project-info {
      width: 64%;
      box-sizing: border-box;
      padding-left: 4%;
      min-width: 280px;
    }
    .work .project h3 {
      margin: 0 0 6px 0;
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      font-weight: 400;
      color: var(--accent);
      text-align: left;
    }
    .work .meta {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 12px;
      text-align: left;
    }
    .work .desc {
      font-size: 15px;
      line-height: 1.6;
      color: #222;
      text-align: left;
      margin-bottom: 10px;
    }

    .about .text-wrap {
      max-width: 880px;
      margin-left: auto;
      margin-right: auto;
      text-align: center;
    }
    .about .eng, .about .jp {
      font-size: 16px;
      color: #222;
      line-height: 1.7;
      margin-bottom: 12px;
    }

    .contact .contact-list {
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
      text-align: center;
      font-size: 16px;
    }
    .contact .contact-list a {
      color: var(--accent);
      text-decoration: none;
    }
    .contact .contact-list .social {
      display: inline-flex;
      gap: 10px;
      align-items: center;
      color: #666;
    }

    /* mobile / smaller screens: stack and increase thumbnail sizes proportionally */
    @media (max-width: 980px) {
      .work .project-inner {
        flex-direction: column;
      }
      .work .project-text, .work .project-info {
        width: 100%;
        padding: 0;
      }
      .work .media-grid {
        justify-content: flex-start;
      }
      .work .media-grid > * {
        /* on mobile allow thumbnails to scale larger relative to narrow column */
        flex: 0 0 clamp(96px, 22vw, 160px);
      }
      .hero .title, .hero .title-jp {
        font-size: clamp(24px, 8vw, 40px);
      }
      .wrap {
        padding: 110px 18px 60px 18px;
      }
    }
    @media (prefers-reduced-motion: reduce) {
      * {
        transition: none !important;
        animation: none !important;
      }
    }
  </style>
</head>

    <nav class="top-nav" role="navigation" aria-label="Main navigation">
      <a href="#work">作品 / Work</a>
      <a href="#about">自己紹介 / About</a>
      <a href="#contact">連絡先 / Contact</a>
    </nav>
  </header>
